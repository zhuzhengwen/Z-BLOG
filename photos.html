<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片墙 - Z-BLOG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 照片墙专属样式 ─────────────────────────────── */
    .photos-hero {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #fff; text-align: center; padding: 60px 20px 48px;
    }
    .photos-hero__title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .photos-hero__sub { color: #94a3b8; font-size: .95rem; }
    .photos-hero__count { display: inline-block; margin-top: 12px; background: rgba(255,255,255,.1); padding: 4px 14px; border-radius: 99px; font-size: .85rem; }

    /* ── 筛选栏 ─────────────────────────────────────── */
    .photos-toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 0; flex-wrap: wrap;
    }
    .photos-search {
      flex: 1; min-width: 200px;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
    }
    .photos-search input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: .875rem; flex: 1;
    }
    .photos-search input::placeholder { color: var(--text-muted); }
    .layout-btns { display: flex; gap: 4px; }
    .layout-btn {
      width: 34px; height: 34px; border-radius: 7px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; transition: all var(--transition);
    }
    .layout-btn.active { background: var(--primary); border-color: var(--primary); }

    /* ── 瀑布流布局 ─────────────────────────────────── */
    .photo-masonry {
      columns: 6 150px; column-gap: 10px;
      padding: 20px 0 60px;
    }
    .photo-masonry--grid {
      columns: unset;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    @media (max-width: 900px) {
      .photo-masonry { columns: 4 130px; }
      .photo-masonry--grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
    @media (max-width: 600px) {
      .photo-masonry { columns: 3 110px; column-gap: 8px; }
      .photo-masonry--grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }
    .photo-item {
      break-inside: avoid; margin-bottom: 12px;
      border-radius: 10px; overflow: hidden;
      position: relative; cursor: zoom-in;
      background: var(--surface-2);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .photo-masonry--grid .photo-item { margin-bottom: 0; }
    .photo-item:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .photo-item img { width: 100%; display: block; transition: transform .4s; }
    .photo-item:hover img { transform: scale(1.04); }

    .photo-item__overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.7));
      color: #fff; padding: 28px 12px 10px;
      opacity: 0; transition: opacity var(--transition);
    }
    .photo-item:hover .photo-item__overlay { opacity: 1; }
    .photo-item__title { font-size: .82rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .photo-item__date { font-size: .72rem; opacity: .8; }

    /* ── 加强版灯箱 ─────────────────────────────────── */
    .photo-lightbox {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.96);
      flex-direction: column; align-items: center; justify-content: center;
    }
    .photo-lightbox.open { display: flex; }
    .photo-lightbox__img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 20px;
    }
    .photo-lightbox__img { max-width: 92vw; max-height: 78vh; object-fit: contain; border-radius: 4px; }
    .photo-lightbox__info {
      width: 100%; padding: 12px 20px 20px;
      text-align: center; color: #fff;
    }
    .photo-lightbox__title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .photo-lightbox__meta { font-size: .8rem; color: rgba(255,255,255,.6); }
    .photo-lightbox__close {
      position: absolute; top: 16px; right: 20px;
      color: #fff; font-size: 1.8rem; cursor: pointer;
      background: rgba(255,255,255,.1); border: none;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-lightbox__nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.15); border: none; color: #fff;
      width: 44px; height: 44px; border-radius: 50%; font-size: 1.4rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .photo-lightbox__nav:hover { background: rgba(255,255,255,.3); }
    .photo-lightbox__prev { left: 16px; }
    .photo-lightbox__next { right: 16px; }
    .photo-lightbox__counter {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.7); font-size: .8rem; background: rgba(0,0,0,.4);
      padding: 4px 12px; border-radius: 99px;
    }

    /* ── Loading ────────────────────────────────────── */
    .photos-loading {
      text-align: center; padding: 48px 20px;
      color: var(--text-muted);
    }
    .photos-loading__spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────── -->
<header class="header">
  <div class="container header__inner">
    <a class="header__logo" href="index.html">📝 <span id="siteTitle">Z-BLOG</span></a>
    <nav class="header__nav">
      <a class="header__nav-item" href="index.html">🏠 <span>首页</span></a>
      <span class="header__nav-item active">🖼️ <span>照片墙</span></span>
      <a class="header__nav-item" href="mobile.html">📱 <span>手机版</span></a>
    </nav>
    <div class="header__search">
      <span>🔍</span>
      <input type="search" id="searchInput" placeholder="搜索图片…" autocomplete="off">
    </div>
  </div>
</header>

<!-- ── Hero ──────────────────────────────────────────────── -->
<div class="photos-hero">
  <p class="photos-hero__title">🖼️ 照片墙</p>
  <p class="photos-hero__sub">所有图片集锦，点击查看大图</p>
  <span class="photos-hero__count" id="photoCount">加载中…</span>
</div>

<!-- ── Main ──────────────────────────────────────────────── -->
<div class="container">
  <div class="photos-toolbar">
    <div class="photos-search">
      <span>🔍</span>
      <input type="search" id="filterInput" placeholder="筛选图片标题…">
    </div>
    <div class="layout-btns">
      <button class="layout-btn active" id="btnMasonry" title="瀑布流" onclick="setLayout('masonry')">⬛</button>
      <button class="layout-btn" id="btnGrid" title="网格" onclick="setLayout('grid')">⊞</button>
    </div>
  </div>

  <div id="photoWall" class="photo-masonry">
    <div class="photos-loading">
      <div class="photos-loading__spinner"></div>
      <p>正在加载所有图片…</p>
    </div>
  </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">
  <div class="container">
    <p>
      由 <a href="https://github.com" target="_blank">GitHub Issues</a> 驱动 ·
      <a href="index.html">🖥️ 桌面版</a> ·
      <a href="mobile.html">📱 手机版</a>
    </p>
    <p style="margin-top:6px">
      <span id="siteRuntime"></span> ·
      <span id="busuanzi_container_site_uv">访客 <span id="busuanzi_value_site_uv">-</span> 人</span> ·
      <span id="busuanzi_container_site_pv">浏览 <span id="busuanzi_value_site_pv">-</span> 次</span>
    </p>
  </div>
</footer>

<!-- ── 照片灯箱 ──────────────────────────────────────────── -->
<div class="photo-lightbox" id="photoLightbox">
  <button class="photo-lightbox__close" onclick="closeLb()">✕</button>
  <span class="photo-lightbox__counter" id="lbCounter"></span>
  <button class="photo-lightbox__nav photo-lightbox__prev" onclick="lbPrev()">‹</button>
  <div class="photo-lightbox__img-wrap">
    <img class="photo-lightbox__img" id="lbImg" src="" alt="">
  </div>
  <button class="photo-lightbox__nav photo-lightbox__next" onclick="lbNext()">›</button>
  <div class="photo-lightbox__info">
    <p class="photo-lightbox__title" id="lbTitle"></p>
    <p class="photo-lightbox__meta" id="lbMeta"></p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/photos.js"></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  document.getElementById('siteTitle').textContent = CONFIG.siteTitle;
  document.title = '照片墙 - ' + CONFIG.siteTitle;
</script>
</body>
</html>
