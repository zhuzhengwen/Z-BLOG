<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="基于 GitHub Issues 的个人博客">
  <title>Z-BLOG</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <!-- Mobile 跳转 -->
  <link rel="alternate" media="only screen and (max-width:768px)" href="mobile.html">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    @media (prefers-color-scheme: dark) {
      .hljs-github { display: none; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
</head>
<body>

<!-- ── Yilia 布局 ─────────────────────────────────────── -->
<div class="yilia">

  <!-- 左侧固定侧边栏 -->
  <aside class="yilia-left" id="yiliaLeft">
    <div class="yilia-left__inner">
      <!-- 头像 + 名称 -->
      <div class="yilia-left__profile">
        <a id="sidebarAvatarLink" href="#" target="_blank" rel="noopener">
          <img class="yilia-left__avatar" id="sidebarAvatar" src="" alt="">
        </a>
        <h1 class="yilia-left__title" id="siteTitle">Z-BLOG</h1>
        <p class="yilia-left__subtitle" id="siteDesc"></p>
      </div>

      <!-- 导航分类 -->
      <nav class="yilia-left__nav" id="sidebarNav">
        <a class="yilia-nav__item active" data-cat="all" href="#/">
          <span class="yilia-nav__icon">📚</span>全部
        </a>
      </nav>

      <!-- 搜索 -->
      <div class="yilia-left__search">
        <svg class="yilia-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input type="search" id="searchInput" placeholder="搜索文章…" autocomplete="off">
      </div>

      <!-- 底部链接 -->
      <div class="yilia-left__footer">
        <div class="yilia-left__links">
          <a href="photos.html" title="照片墙">🖼️ 照片墙</a>
          <a href="mobile.html" title="手机版">📱 手机版</a>
          <a href="#" onclick="app&&app.api.clearCache();showToast('缓存已清除');return false">🔄 刷新</a>
          <a href="#" id="tokenEntryBtn" onclick="showTokenDialog();return false">⚙️ Token</a>
        </div>
        <div class="yilia-left__stats">
          <span id="siteRuntime"></span>
        </div>
        <div class="yilia-left__powered">
          Powered by <a href="https://github.com" target="_blank">GitHub Issues</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- 右侧主内容区 -->
  <main class="yilia-main" id="main">
    <div class="section-header">
      <h1 class="section-header__title">📚 全部文章</h1>
    </div>
    <div class="post-list" id="postListInit">
      <div class="skeleton-card">
        <div class="skeleton skeleton--short"></div>
        <div class="skeleton skeleton--line"></div>
        <div class="skeleton skeleton--medium"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton skeleton--short"></div>
        <div class="skeleton skeleton--line"></div>
        <div class="skeleton skeleton--medium"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton skeleton--short"></div>
        <div class="skeleton skeleton--line"></div>
        <div class="skeleton skeleton--medium"></div>
      </div>
    </div>
  </main>

</div>

<!-- ── 灯箱 ──────────────────────────────────────────────── -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox__close" onclick="closeLightbox()" aria-label="关闭">✕</button>
  <img src="" alt="图片预览">
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- ── Token 设置弹窗 ─────────────────────────────────────── -->
<div id="tokenModal" style="
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.5);align-items:center;justify-content:center;">
  <div style="
    background:var(--surface);border-radius:12px;padding:28px;
    width:min(460px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <h3 style="margin:0 0 6px;font-size:1.1rem">⚙️ 设置 GitHub Token</h3>
    <p style="margin:0 0 16px;font-size:.82rem;color:var(--text-muted);line-height:1.6">
      Token 仅保存在<strong>你的浏览器</strong>中，不会上传到任何地方。<br>
      设置后 API 限额从 60次/小时 提升至 5000次/小时。
    </p>
    <p id="tokenRateMsg" style="display:none;margin:0 0 14px;padding:10px 14px;
      background:#fef9c3;border-radius:7px;font-size:.82rem;color:#854d0e">
      ⚠️ 当前 IP 已触发频率限制，设置 Token 后即可继续使用。
    </p>
    <input id="tokenInput" type="password"
      placeholder="ghp_xxxxxxxxxxxxxxxx"
      style="width:100%;box-sizing:border-box;padding:10px 14px;
        border:1px solid var(--border);border-radius:8px;
        font-size:.9rem;font-family:monospace;background:var(--surface);
        color:var(--text);outline:none;margin-bottom:8px">
    <p style="font-size:.75rem;color:var(--text-muted);margin:0 0 18px">
      前往 GitHub → Settings → Developer settings → Personal access tokens → 勾选 <code>public_repo</code> 生成
    </p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeTokenDialog()"
        style="padding:8px 18px;border-radius:7px;border:1px solid var(--border);
          background:var(--surface);color:var(--text);cursor:pointer;font-size:.875rem">
        取消
      </button>
      <button onclick="clearTokenDialog()"
        style="padding:8px 18px;border-radius:7px;border:1px solid var(--border);
          background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:.875rem">
        清除 Token
      </button>
      <button onclick="saveTokenDialog()"
        style="padding:8px 20px;border-radius:7px;border:none;
          background:var(--primary);color:#fff;cursor:pointer;font-size:.875rem;font-weight:600">
        保存
      </button>
    </div>
    <p id="tokenStatus" style="margin:12px 0 0;font-size:.8rem;text-align:center;color:var(--text-muted)"></p>
  </div>
</div>

<script>
function showTokenDialog(resetTime) {
  const modal = document.getElementById('tokenModal');
  const input = document.getElementById('tokenInput');
  const msg   = document.getElementById('tokenRateMsg');
  modal.style.display = 'flex';
  if (app && app.api) input.value = app.api.getToken() || '';
  if (resetTime) {
    msg.style.display = 'block';
    msg.textContent = `⚠️ 已触发 API 频率限制，请 ${resetTime} 后重试，或设置 Token 立即解除限制。`;
  } else {
    msg.style.display = 'none';
  }
  document.getElementById('tokenStatus').textContent = '';
  setTimeout(() => input.focus(), 50);
}

function closeTokenDialog() {
  document.getElementById('tokenModal').style.display = 'none';
}

function clearTokenDialog() {
  document.getElementById('tokenInput').value = '';
  if (app && app.api) app.api.setToken('');
  document.getElementById('tokenStatus').textContent = '✅ Token 已清除，恢复匿名模式（60次/小时）';
  document.getElementById('tokenStatus').style.color = '#64748b';
  setTimeout(closeTokenDialog, 1500);
}

async function saveTokenDialog() {
  const token = document.getElementById('tokenInput').value.trim();
  const status = document.getElementById('tokenStatus');
  if (!token) { clearTokenDialog(); return; }

  status.textContent = '验证中…';
  status.style.color = 'var(--text-muted)';

  try {
    const res = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      const user = await res.json();
      if (app && app.api) app.api.setToken(token);
      status.textContent = `✅ 验证成功！已登录为 @${user.login}`;
      status.style.color = '#16a34a';
      setTimeout(() => { closeTokenDialog(); location.reload(); }, 1500);
    } else {
      status.textContent = '❌ Token 无效，请检查是否填写正确';
      status.style.color = '#dc2626';
    }
  } catch (e) {
    status.textContent = '❌ 网络错误，请重试';
    status.style.color = '#dc2626';
  }
}

document.getElementById('tokenModal').addEventListener('click', function(e) {
  if (e.target === this) closeTokenDialog();
});

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('tokenEntryBtn');
  if (!btn) return;
  const saved = localStorage.getItem('zblog_user_token');
  btn.textContent = saved ? '✅ Token' : '⚙️ Token';
  btn.title = saved ? '已设置 Token（5000次/小时）' : '未设置 Token（60次/小时）';
});
</script>

<!-- ── Scripts ───────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  // 运行时间
  (function() {
    const el = document.getElementById('siteRuntime');
    if (!el) return;
    const tick = () => {
      const start = new Date(CONFIG.siteStartDate || '2026-03-26');
      const s = Math.floor((Date.now() - start) / 1000);
      const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
            m = Math.floor((s % 3600) / 60), sec = s % 60;
      el.textContent = `运行 ${d}天 ${h}时 ${m}分 ${sec}秒`;
    };
    document.addEventListener('DOMContentLoaded', () => { tick(); setInterval(tick, 1000); });
  })();
</script>
<script src="js/theme.js"></script>
<script src="js/music.js"></script>
<script src="js/app.js"></script>

</body>
</html>
